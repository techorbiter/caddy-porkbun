name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ghcr.io/{{ github.repository }} -t ghcr.io/{{ github.repository }}:{{ github.sha }} .
          docker push ghcr.io/{{ github.repository }}
          docker push ghcr.io/{{ github.repository }}:{{ github.sha }}
