name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'    # check every Monday
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login, build, and push image
        run: |
          docker pull caddy:2
          full_version=$(docker inspect docker.io/caddy:2 \
            --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' \
            | sed 's/^v//')
          minor_version=$(echo $full_version | cut -d. -f1-2)
          major_version=$(echo $full_version | cut -d. -f1)
          docker login --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} ghcr.io
          docker build \
            -t ghcr.io/${{ github.repository }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}:$full_version \
            -t ghcr.io/${{ github.repository }}:$minor_version \
            -t ghcr.io/${{ github.repository }}:$major_version \
            .
          docker push ghcr.io/${{ github.repository }}
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:$full_version
          docker push ghcr.io/${{ github.repository }}:$minor_version
          docker push ghcr.io/${{ github.repository }}:$major_version

      - name: Delete old packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'caddy-porkbun'
          package-type: 'container'
          min-versions-to-keep: 5
          num-old-versions-to-delete: 3
